# Inherit model, reasoning, and personal preferences from ~/.codex/config.toml.
approval_policy = "on-request"
sandbox_mode = "workspace-write"

# BEGIN GENERATED MCP SERVERS: codex-mcp-sync
# Generated by dotfiles/scripts/hg-codex-mcp-sync.sh from .mcp.json and mcp-profile-policy.json
# Read-oriented prompt analysis and linting profile.
[mcp_servers.prompt_improver_review]
command = "bash"
args = ["-lc", "exec \"$HOME/hairglasses-studio/prompt-improver/scripts/mcp/prompt-improver-mcp.sh\""]
enabled_tools = [
  "analyze_prompt",
  "lint_prompt",
  "diff_prompt",
  "check_claudemd",
  "list_templates",
]

# Curated prompt improvement and template workflow surface.
[mcp_servers.prompt_improver_workspace]
command = "bash"
args = ["-lc", "exec \"$HOME/hairglasses-studio/prompt-improver/scripts/mcp/prompt-improver-mcp.sh\""]
enabled_tools = [
  "analyze_prompt",
  "enhance_prompt",
  "lint_prompt",
  "diff_prompt",
  "improve_prompt",
  "check_claudemd",
  "list_templates",
]

# END GENERATED MCP SERVERS: codex-mcp-sync

[profiles.readonly_quiet]
approval_policy = "never"
sandbox_mode = "read-only"
model_reasoning_effort = "medium"

[profiles.review]
approval_policy = "on-request"
sandbox_mode = "read-only"
model_reasoning_effort = "high"

[profiles.workspace_auto]
approval_policy = "on-failure"
sandbox_mode = "workspace-write"
model_reasoning_effort = "high"

[profiles.ci_json]
approval_policy = "never"
sandbox_mode = "workspace-write"
model_reasoning_effort = "medium"

# BEGIN GENERATED OLLAMA PROFILES: provider-settings-sync
