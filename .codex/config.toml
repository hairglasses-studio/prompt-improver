[model_providers.ollama_local]
name = "Local Ollama"
base_url = "http://127.0.0.1:11434/v1"
env_key = "OLLAMA_API_KEY"
env_key_instructions = "source \"$HOME/hairglasses-studio/dotfiles/scripts/lib/hg-local-llm.sh\" && hg_local_llm_export_env"
